<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polla Mundial 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --bg-color: #121824;
        --card-bg: #1e2530;
        --accent-color: #f1c40f;
        --text-color: #ffffff;
        --text-muted: #8b94a5;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 750px;
      }

      h1 {
        text-align: center;
        font-size: 24px;
        margin-bottom: 25px;
      }

      .login-layout {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        align-items: flex-start;
      }

      .usuarios-panel {
        flex: 0 0 200px;
        background-color: var(--card-bg);
        border-radius: 12px;
        padding: 15px;
      }

      .usuarios-panel h3 {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 0 0 8px 0;
      }

      .usuarios-panel .hint {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.5;
        margin: 0 0 12px 0;
      }

      .lista-usuarios {
        display: flex;
        flex-direction: column;
        gap: 5px;
        max-height: 220px;
        overflow-y: auto;
      }

      .usuario-item {
        background-color: #2c3545;
        border: none;
        color: var(--text-color);
        padding: 8px 12px;
        border-radius: 8px;
        text-align: left;
        cursor: pointer;
        font-size: 13px;
        transition: background-color 0.2s, color 0.2s;
      }

      .usuario-item:hover {
        background-color: #3a4454;
        color: var(--accent-color);
      }

      .user-section {
        flex: 1;
        background-color: var(--card-bg);
        padding: 15px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      @media (max-width: 600px) {
        .login-layout {
          flex-direction: column-reverse;
        }
        .usuarios-panel {
          flex: none;
          width: 100%;
          box-sizing: border-box;
        }
      }

      .btn-register {
        background-color: #3498db;
        color: #fff;
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
      }

      .user-status {
        font-size: 13px;
        color: var(--text-muted);
        text-align: center;
        min-height: 18px;
      }

      .user-status.ok {
        color: #2ecc71;
      }

      .user-status.error {
        color: #e74c3c;
      }

      input {
        background-color: #121824;
        border: 1px solid #313d4f;
        color: white;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
      }

      /* Tarjeta de Partido */
      .match-card {
        background-color: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .match-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .badge-fase {
        background-color: #2c3545;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        color: var(--text-muted);
      }

      .status-prog {
        color: #3498db;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: bold;
      }

      .status-cerrado {
        color: #e74c3c;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: bold;
      }

      .prediccion-guardada {
        text-align: center;
        color: var(--accent-color);
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .match-teams {
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin-bottom: 20px;
      }

      .team {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 35%;
        text-align: center;
      }

      .flag {
        width: 50px;
        height: 35px;
        object-fit: cover;
        border-radius: 6px;
        margin-bottom: 8px;
      }

      .team-name {
        font-weight: bold;
        font-size: 16px;
      }

      .vs-divider {
        color: var(--text-muted);
        font-weight: bold;
      }

      .match-footer {
        display: flex;
        justify-content: space-between;
        color: var(--text-muted);
        font-size: 13px;
        border-top: 1px solid #2c3545;
        padding-top: 12px;
        margin-bottom: 15px;
      }

      .btn-predict {
        background-color: var(--accent-color);
        color: #000;
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }

      .btn-predict:disabled {
        background-color: #3a4454;
        color: #8b94a5;
        cursor: not-allowed;
        opacity: 0.85;
      }

      .btn-save:disabled {
        background-color: #3a4454;
        color: #8b94a5;
        cursor: not-allowed;
        opacity: 0.85;
      }

      /* --- MODAL FIEL A LA IMAGEN 2 --- */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-content {
        background-color: var(--card-bg);
        padding: 25px;
        border-radius: 20px;
        width: 90%;
        max-width: 420px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .modal-header-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      /* El contenedor central de la predicción */
      .prediction-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 25px 0;
      }

      .modal-team {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 30%;
      }

      .modal-team .flag {
        width: 60px;
        height: 40px;
      }

      .modal-team .name {
        font-weight: bold;
        font-size: 18px;
        margin-top: 8px;
      }

      .modal-team .code {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      /* Bloque central de marcadores */
      .score-block {
        display: flex;
        align-items: center;
        background-color: rgba(18, 24, 36, 0.6);
        border: 1px dashed #313d4f;
        border-radius: 14px;
        padding: 10px 15px;
        gap: 10px;
      }

      .input-score {
        width: 45px;
        height: 45px;
        background-color: #121824;
        border: 1px solid #2c3545;
        color: var(--accent-color);
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        border-radius: 8px;
      }

      /* Quitar flechas del input number (Chrome/Safari y Firefox) */
      .input-score::-webkit-inner-spin-button,
      .input-score::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .input-score[type="number"] {
        -moz-appearance: textfield;
      }

      .modal-vs {
        color: var(--text-muted);
        font-weight: bold;
        font-size: 14px;
      }

      .btn-save {
        background-color: var(--accent-color);
        color: #000;
        border: none;
        padding: 14px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
      }

      /* Tabla de Ranking */
      .tabla-ranking {
        width: 100%;
        border-collapse: collapse;
        font-size: 15px;
      }

      .tabla-ranking th {
        color: var(--text-muted);
        font-size: 12px;
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #2c3545;
        text-transform: uppercase;
      }

      .tabla-ranking td {
        padding: 10px 8px;
        border-bottom: 1px solid #2c3545;
      }

      .tabla-ranking tr.fila-yo td {
        color: var(--accent-color);
        font-weight: bold;
      }

      .posicion-medal {
        font-size: 18px;
      }

      /* Tabla del modal "Ver detalle" */
      .tabla-detalle {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .tabla-detalle th {
        color: var(--text-muted);
        font-size: 12px;
        text-align: left;
        padding: 6px 8px;
        border-bottom: 1px solid #2c3545;
        text-transform: uppercase;
      }

      .tabla-detalle td {
        padding: 8px;
        border-bottom: 1px solid #2c3545;
      }

      .detalle-match-info {
        text-align: center;
        margin-bottom: 15px;
      }

      .detalle-match-info .score-final {
        font-size: 22px;
        display: block;
        margin-top: 4px;
      }

      .btn-cerrar {
        background-color: #2c3545;
        color: var(--text-muted);
        border: none;
        padding: 12px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        margin-top: 15px;
      }

      /* Estado pendiente en tarjetas de resultado (solo admin) */
      .status-pendiente {
        color: #e67e22;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: bold;
      }

      .btn-cargar-resultado {
        background-color: transparent;
        color: #e67e22;
        border: 1px solid #e67e22;
        width: 100%;
        padding: 10px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        margin-top: 6px;
      }

      .btn-cargar-resultado:hover {
        background-color: #e67e22;
        color: #fff;
      }

      /* Etiqueta FINAL y marcador en tarjetas de resultado */
      .badge-final {
        background-color: #27ae60;
        color: #fff;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .score-final {
        font-size: 28px;
        font-weight: bold;
        color: var(--accent-color);
        letter-spacing: 4px;
      }

      .btn-ver-detalle {
        background-color: transparent;
        color: #3498db;
        border: 1px solid #3498db;
        width: 100%;
        padding: 10px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        margin-top: 4px;
      }

      .btn-ver-detalle:hover {
        background-color: #3498db;
        color: #fff;
      }

      /* Sub-tabs del dashboard */
      .subtabs-header {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        background-color: var(--card-bg);
        padding: 6px;
        border-radius: 25px;
      }

      .subtab-btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        background-color: transparent;
        color: var(--text-muted);
        transition: background-color 0.2s, color 0.2s;
      }

      .subtab-btn.subtab-activo {
        background-color: #3498db;
        color: #fff;
      }

      /* Estado vacío genérico */
      .estado-vacio {
        color: var(--text-muted);
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
      }

      /* Card contenedor de la tabla de ranking */
      .ranking-card {
        background-color: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      /* Tabs principales */
      .tabs-header {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        background-color: var(--card-bg);
        padding: 6px;
        border-radius: 25px;
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        background-color: transparent;
        color: var(--text-muted);
        transition: background-color 0.2s, color 0.2s;
      }

      .tab-btn.tab-activo {
        background-color: var(--accent-color);
        color: #000;
      }

      /* Sub-tab Predicciones — toggle de agrupación */
      .pred-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        background-color: var(--card-bg);
        padding: 6px;
        border-radius: 25px;
      }

      .pred-toggle-btn {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        font-size: 13px;
        cursor: pointer;
        background-color: transparent;
        color: var(--text-muted);
        transition: background-color 0.2s, color 0.2s;
      }

      .pred-toggle-btn.pred-toggle-activo {
        background-color: #2c3545;
        color: var(--text-color);
      }

      .pred-bloque {
        background-color: var(--card-bg);
        border-radius: 16px;
        padding: 16px 20px;
        margin-bottom: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .pred-bloque-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .pred-fecha {
        color: var(--text-muted);
        font-size: 13px;
      }

      .tabla-pred-global {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .tabla-pred-global th {
        color: var(--text-muted);
        font-size: 12px;
        text-align: left;
        padding: 6px 8px;
        border-bottom: 1px solid #2c3545;
        text-transform: uppercase;
      }

      .tabla-pred-global td {
        padding: 8px;
        border-bottom: 1px solid #2c3545;
      }

      .tabla-pred-global tr:last-child td {
        border-bottom: none;
      }

      .btn-admin-pred {
        background-color: transparent;
        color: #9b59b6;
        border: 1px solid #9b59b6;
        width: 100%;
        padding: 10px;
        border-radius: 25px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        margin-top: 6px;
      }

      .btn-admin-pred:hover {
        background-color: #9b59b6;
        color: #fff;
      }

      .admin-pred-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .admin-pred-select {
        background-color: #121824;
        border: 1px solid #313d4f;
        color: white;
        padding: 12px;
        border-radius: 8px;
        font-size: 15px;
        width: 100%;
        box-sizing: border-box;
      }

      .user-bar {
        display: none;
        align-items: center;
        gap: 12px;
        background-color: var(--card-bg);
        border-radius: 12px;
        padding: 10px 16px;
        margin-bottom: 16px;
      }

      .user-bar-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
        cursor: pointer;
        border: 2px solid var(--accent-color);
        background-color: #2c3545;
        flex-shrink: 0;
      }

      .user-bar-avatar-placeholder {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background-color: #2c3545;
        border: 2px dashed var(--accent-color);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        font-size: 18px;
        color: var(--text-muted);
      }

      .user-bar-nombre {
        font-weight: bold;
        font-size: 15px;
        flex: 1;
      }

      .btn-salir {
        background-color: transparent;
        color: #e74c3c;
        border: 1px solid #e74c3c;
        padding: 7px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        white-space: nowrap;
      }

      .btn-salir:hover {
        background-color: #e74c3c;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏆 MUNDIAL 2026 - PREDICCIONES</h1>

      <div class="user-bar" id="user-bar">
        <div id="user-bar-avatar-wrapper" onclick="document.getElementById('avatar-input').click()" title="Cambiar foto de perfil" style="display:flex;align-items:center">
          <img class="user-bar-avatar" id="user-bar-avatar" src="" alt="Avatar" style="display:none" />
          <div class="user-bar-avatar-placeholder" id="user-bar-avatar-placeholder">👤</div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="cambiarAvatar(event)" />
        <span class="user-bar-nombre" id="user-bar-nombre"></span>
        <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
      </div>

      <div class="tabs-header">
        <button class="tab-btn tab-activo" id="tab-predicciones" onclick="cambiarTab('predicciones')">Predicciones</button>
        <button class="tab-btn" id="tab-dashboard" onclick="cambiarTab('dashboard')">Dashboard</button>
      </div>

      <div id="seccion-predicciones">

      <div class="login-layout">
        <div class="usuarios-panel">
          <h3>Participantes</h3>
          <p class="hint">Hacé clic en tu nombre para ingresar. Si no estás en la lista, escribí tu nombre nuevo abajo.</p>
          <div id="lista-usuarios" class="lista-usuarios">
            <p style="color:var(--text-muted);font-size:12px;margin:0">Cargando...</p>
          </div>
        </div>

        <div class="user-section">
          <label for="username">Tu nombre:</label>
          <input
            type="text"
            id="username"
            placeholder="Ej: Tio Carlos"
          />
          <button class="btn-register" type="button" onclick="registrarUsuario()">
            👤 Ingresar
          </button>
          <p id="user-status" class="user-status"></p>
        </div>
      </div>

      <div id="partidos-container"></div>

      </div><!-- /seccion-predicciones -->

      <div id="seccion-dashboard" style="display:none">
        <div class="subtabs-header">
          <button class="subtab-btn subtab-activo" id="subtab-resultados" onclick="cambiarSubtab('resultados')">Resultados</button>
          <button class="subtab-btn" id="subtab-ranking" onclick="cambiarSubtab('ranking')">Ranking</button>
          <button class="subtab-btn" id="subtab-predicciones-global" onclick="cambiarSubtab('predicciones-global')">Predicciones</button>
        </div>

        <div id="seccion-resultados">
          <!-- se construye en el paso 4 -->
        </div>

        <div id="seccion-ranking" style="display:none">
          <!-- se construye en el paso 7 -->
        </div>

        <div id="seccion-predicciones-global" style="display:none">
        </div>
      </div>
    </div>

    <div id="predictionModal" class="modal">
      <div class="modal-content">
        <div class="modal-header-info">
          <span class="badge-fase" id="modal-fase">R32</span>
          <span class="status-prog">PROGRAMADO</span>
        </div>

        <div class="prediction-row">
          <div class="modal-team">
            <img id="modal-img-1" class="flag" src="" alt="" />
            <span id="modal-name-1" class="name">---</span>
            <span id="modal-code-1" class="code">---</span>
          </div>

          <div class="score-block">
            <input
              type="number"
              id="score1"
              class="input-score"
              placeholder="?"
              min="0"
            />
            <span class="modal-vs">VS</span>
            <input
              type="number"
              id="score2"
              class="input-score"
              placeholder="?"
              min="0"
            />
          </div>

          <div class="modal-team">
            <img id="modal-img-2" class="flag" src="" alt="" />
            <span id="modal-name-2" class="name">---</span>
            <span id="modal-code-2" class="code">---</span>
          </div>
        </div>

        <div class="match-footer" style="justify-content: center; gap: 20px">
          <span id="modal-date">📅 -- jun, --:--</span>
          <span id="modal-location">📍 Los Ángeles</span>
        </div>

        <button class="btn-save" id="btn-guardar-prediccion" onclick="guardarPrediccion()">
          ✏️ Confirmar Predicción
        </button>
      </div>
    </div>

    <div id="detalleModal" class="modal">
      <div class="modal-content">
        <div class="modal-header-info">
          <span class="badge-fase" id="detalle-fase">R32</span>
          <span class="badge-final" id="detalle-resultado"></span>
        </div>

        <div class="detalle-match-info">
          <span id="detalle-equipos" style="font-weight:bold;font-size:16px"></span>
        </div>

        <div id="detalle-tabla-container" style="overflow-y:auto;max-height:280px"></div>

        <button class="btn-cerrar" onclick="document.getElementById('detalleModal').style.display='none'">
          Cerrar
        </button>
      </div>
    </div>

    <div id="adminPredModal" class="modal">
      <div class="modal-content">
        <div class="modal-header-info">
          <span class="badge-fase" id="admin-pred-fase">R32</span>
          <span style="font-size:13px;color:var(--text-muted)">Agregar predicción</span>
        </div>
        <div style="text-align:center;margin-bottom:12px">
          <strong id="admin-pred-equipos" style="font-size:16px"></strong>
        </div>
        <div id="admin-pred-form-container"></div>

    <script>
      function cambiarSubtab(subtab) {
        document.getElementById("seccion-resultados").style.display =
          subtab === "resultados" ? "block" : "none";
        document.getElementById("seccion-ranking").style.display =
          subtab === "ranking" ? "block" : "none";
        document.getElementById("seccion-predicciones-global").style.display =
          subtab === "predicciones-global" ? "block" : "none";
        document.getElementById("subtab-resultados").classList.toggle("subtab-activo", subtab === "resultados");
        document.getElementById("subtab-ranking").classList.toggle("subtab-activo", subtab === "ranking");
        document.getElementById("subtab-predicciones-global").classList.toggle("subtab-activo", subtab === "predicciones-global");
        if (subtab === "resultados") renderizarResultados();
        if (subtab === "ranking") renderizarRanking();
        if (subtab === "predicciones-global") {
          const container = document.getElementById("seccion-predicciones-global");
          container.innerHTML = `
            <div class="pred-toggle">
              <button class="pred-toggle-btn pred-toggle-activo" id="toggle-partido" onclick="mostrarPrediccionesGlobal('partido')">Partido</button>
              <button class="pred-toggle-btn" id="toggle-usuario" onclick="mostrarPrediccionesGlobal('usuario')">Usuario</button>
            </div>
            <div id="pred-filtro" style="margin-bottom:15px"></div>
            <div id="pred-contenido"></div>
          `;
          mostrarPrediccionesGlobal("partido");
        }
      }

      async function cargarTodasLasPredicciones() {
        const todosIds = listaPartidos.map((p) => p.id);

        const [predResult, usuariosResult] = await Promise.all([
          todosIds.length
            ? supabaseClient
                .from("predicciones")
                .select("partido_id, goles_equipo_1, goles_equipo_2, usuarios(nombre)")
                .in("partido_id", todosIds)
            : Promise.resolve({ data: [], error: null }),
          supabaseClient
            .from("usuarios")
            .select("nombre")
            .order("nombre", { ascending: true }),
        ]);

        if (predResult.error) throw predResult.error;
        if (usuariosResult.error) throw usuariosResult.error;

        prediccionesGlobales = (predResult.data || []).map((d) => ({
          partido_id: d.partido_id,
          usuario_nombre: d.usuarios.nombre,
          goles_equipo_1: d.goles_equipo_1,
          goles_equipo_2: d.goles_equipo_2,
        }));

        todosLosUsuarios = (usuariosResult.data || [])
          .filter((u) => u.nombre !== "adminmlc")
          .map((u) => u.nombre);
      }

      async function mostrarPrediccionesGlobal(agrupacion) {
        const togglePartido = document.getElementById("toggle-partido");
        const toggleUsuario = document.getElementById("toggle-usuario");
        if (togglePartido) togglePartido.classList.toggle("pred-toggle-activo", agrupacion === "partido");
        if (toggleUsuario) toggleUsuario.classList.toggle("pred-toggle-activo", agrupacion === "usuario");

        const contenido = document.getElementById("pred-contenido");
        contenido.innerHTML = '<p class="estado-vacio">Cargando...</p>';

        try {
          await cargarTodasLasPredicciones();
        } catch (e) {
          console.error(e);
          contenido.innerHTML = '<p class="estado-vacio" style="color:#e74c3c">Error al cargar predicciones.</p>';
          return;
        }

        renderizarFiltroPred(agrupacion);
        renderizarContenidoPred(agrupacion, "");
      }

      function renderizarFiltroPred(agrupacion) {
        const filtroContainer = document.getElementById("pred-filtro");
        if (!filtroContainer) return;

        if (agrupacion === "partido") {
          const options = listaPartidos.map((p) => {
            const { fecha } = formatearFechaPartido(p.fecha, p.hora);
            return `<option value="${p.id}">${p.equipo_1} vs ${p.equipo_2} — ${fecha}</option>`;
          }).join("");
          filtroContainer.innerHTML = `
            <select class="admin-pred-select" id="filtro-select"
              onchange="renderizarContenidoPred('partido', this.value)">
              <option value="">Todos los partidos</option>
              ${options}
            </select>`;
        } else {
          const options = todosLosUsuarios.map((nombre) =>
            `<option value="${nombre}">${nombre}</option>`
          ).join("");
          filtroContainer.innerHTML = `
            <select class="admin-pred-select" id="filtro-select"
              onchange="renderizarContenidoPred('usuario', this.value)">
              <option value="">Todos los usuarios</option>
              ${options}
            </select>`;
        }
      }

      function renderizarContenidoPred(agrupacion, filtro) {
        const contenido = document.getElementById("pred-contenido");

        if (agrupacion === "partido") {
          const partidos = filtro
            ? listaPartidos.filter((p) => p.id === filtro)
            : listaPartidos;

          if (!partidos.length) {
            contenido.innerHTML = '<p class="estado-vacio">No hay partidos registrados.</p>';
            return;
          }

          let html = "";
          partidos.forEach((partido) => {
            const { fecha } = formatearFechaPartido(partido.fecha, partido.hora);
            const preds = prediccionesGlobales.filter((p) => p.partido_id === partido.id);
            const filas = todosLosUsuarios
              .map((nombre) => {
                const pred = preds.find((p) => p.usuario_nombre === nombre);
                return `<tr>
                  <td>${nombre}</td>
                  <td style="text-align:center">${pred ? `${pred.goles_equipo_1} - ${pred.goles_equipo_2}` : "—"}</td>
                </tr>`;
              })
              .join("");
            html += `
              <div class="pred-bloque">
                <div class="pred-bloque-header">
                  <span class="badge-fase">${partido.fase || "R32"}</span>
                  <strong>${partido.equipo_1} vs ${partido.equipo_2}</strong>
                  <span class="pred-fecha">📅 ${fecha}</span>
                </div>
                <table class="tabla-pred-global">
                  <thead><tr><th>Usuario</th><th style="text-align:center">Predicción</th></tr></thead>
                  <tbody>${filas || '<tr><td colspan="2" style="text-align:center;color:var(--text-muted)">Nadie predijo este partido</td></tr>'}</tbody>
                </table>
              </div>`;
          });
          contenido.innerHTML = html;

        } else {
          const usuarios = filtro
            ? todosLosUsuarios.filter((n) => n === filtro)
            : todosLosUsuarios;

          if (!usuarios.length) {
            contenido.innerHTML = '<p class="estado-vacio">No hay participantes registrados.</p>';
            return;
          }

          let html = "";
          usuarios.forEach((nombre) => {
            const preds = prediccionesGlobales.filter((p) => p.usuario_nombre === nombre);
            const filas = listaPartidos
              .map((partido) => {
                const { fecha } = formatearFechaPartido(partido.fecha, partido.hora);
                const pred = preds.find((p) => p.partido_id === partido.id);
                return `<tr>
                  <td>${partido.equipo_1} vs ${partido.equipo_2} <span class="pred-fecha">📅 ${fecha}</span></td>
                  <td style="text-align:center">${pred ? `${pred.goles_equipo_1} - ${pred.goles_equipo_2}` : "—"}</td>
                </tr>`;
              })
              .join("");
            html += `
              <div class="pred-bloque">
                <div class="pred-bloque-header">
                  <strong style="font-size:16px">${nombre}</strong>
                </div>
                <table class="tabla-pred-global">
                  <thead><tr><th>Partido</th><th style="text-align:center">Predicción</th></tr></thead>
                  <tbody>${filas}</tbody>
                </table>
              </div>`;
          });
          contenido.innerHTML = html;
        }
      }

      async function renderizarRanking() {
        const container = document.getElementById("seccion-ranking");
        const hayResultados = listaPartidos.some(
          (p) => p.resultado_equipo_1 !== null && p.resultado_equipo_2 !== null,
        );

        if (!hayResultados) {
          container.innerHTML =
            '<p class="estado-vacio">No hay resultados cargados aún.</p>';
          return;
        }

        container.innerHTML =
          '<p class="estado-vacio">Cargando ranking...</p>';

        const { data: todosUsuarios, error: errUsuarios } = await supabaseClient
          .from("usuarios")
          .select("id, nombre, puntos")
          .order("puntos", { ascending: false });

        if (errUsuarios) {
          console.error(errUsuarios);
          container.innerHTML =
            '<p class="estado-vacio" style="color:#e74c3c">Error al cargar el ranking.</p>';
          return;
        }

        const ranking = (todosUsuarios || []).filter((u) => u.nombre !== "adminmlc");

        const medallas = ["🥇", "🥈", "🥉"];
        const filas = ranking
          .map((entry, i) => {
            const pos = medallas[i] ?? `<span style="color:var(--text-muted)">${i + 1}</span>`;
            const esYo = usuarioActual?.nombre === entry.nombre;
            return `
              <tr class="${esYo ? "fila-yo" : ""}">
                <td class="posicion-medal" style="text-align:center">${pos}</td>
                <td>${entry.nombre}</td>
                <td style="text-align:center;font-weight:bold">${entry.puntos}</td>
              </tr>`;
          })
          .join("");

        container.innerHTML = `
          <div class="ranking-card">
            <table class="tabla-ranking">
              <thead>
                <tr>
                  <th style="text-align:center">#</th>
                  <th>Usuario</th>
                  <th style="text-align:center">Puntos</th>
                </tr>
              </thead>
              <tbody>${filas}</tbody>
            </table>
          </div>`;
      }

      function renderizarResultados() {
        const container = document.getElementById("seccion-resultados");
        const esAdmin = usuarioActual?.nombre === "adminmlc";

        const partidos = esAdmin
          ? listaPartidos
          : listaPartidos.filter(
              (p) => p.resultado_equipo_1 !== null && p.resultado_equipo_2 !== null,
            );

        if (!partidos.length) {
          container.innerHTML =
            '<p class="estado-vacio">No hay resultados cargados aún.</p>';
          return;
        }

        container.innerHTML = "";
        partidos.forEach((partido) => {
          const { fecha } = formatearFechaPartido(partido.fecha, partido.hora);
          const tieneResultado =
            partido.resultado_equipo_1 !== null && partido.resultado_equipo_2 !== null;
          const bandera1 = partido.bandera_1
            ? `<img class="flag" src="${partido.bandera_1}" alt="">`
            : "";
          const bandera2 = partido.bandera_2
            ? `<img class="flag" src="${partido.bandera_2}" alt="">`
            : "";

          const marcador = tieneResultado
            ? `<div class="score-final">${partido.resultado_equipo_1} - ${partido.resultado_equipo_2}</div>`
            : `<div class="vs-divider">VS</div>`;

          const badgeEstado = tieneResultado
            ? `<span class="badge-final">FINAL</span>`
            : `<span class="status-pendiente">PENDIENTE</span>`;

          const btnVerDetalle = tieneResultado
            ? `<button class="btn-ver-detalle" onclick="abrirModalDetalle('${partido.id}')">🔍 Ver detalle</button>`
            : "";

          const btnCargarResultado = esAdmin
            ? `<button class="btn-cargar-resultado" onclick="abrirModalCargarResultado('${partido.id}')">⚽ ${tieneResultado ? "Editar resultado" : "Cargar resultado"}</button>`
            : "";

          const card = document.createElement("div");
          card.className = "match-card";
          card.innerHTML = `
            <div class="match-header">
              <span class="badge-fase">${partido.fase || "R32"}</span>
              ${badgeEstado}
            </div>
            <div class="match-teams">
              <div class="team">
                ${bandera1}
                <span class="team-name">${partido.equipo_1}</span>
              </div>
              ${marcador}
              <div class="team">
                ${bandera2}
                <span class="team-name">${partido.equipo_2}</span>
              </div>
            </div>
            <div class="match-footer">
              <span>📅 ${fecha}</span>
            </div>
            ${btnVerDetalle}
            ${btnCargarResultado}
          `;
          container.appendChild(card);
        });
      }

      function cambiarTab(tab) {
        document.getElementById("seccion-predicciones").style.display =
          tab === "predicciones" ? "block" : "none";
        document.getElementById("seccion-dashboard").style.display =
          tab === "dashboard" ? "block" : "none";
        document.getElementById("tab-predicciones").classList.toggle("tab-activo", tab === "predicciones");
        document.getElementById("tab-dashboard").classList.toggle("tab-activo", tab === "dashboard");
        if (tab === "dashboard") renderizarResultados();
      }

      const SUPABASE_URL = "https://agwaokiruxodrhcljrrh.supabase.co";
      const SUPABASE_KEY = "sb_publishable_CwHTOPavJaW6D5pKKDBZ_w_Sf9y1d76";
      const { createClient } = supabase;
      const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

      let partidoSeleccionadoId = null;
      let partidoSeleccionadoIndex = null;
      let listaPartidos = [];
      let usuarioActual = null;
      let prediccionesUsuario = {};
      let partidoParaResultadoId = null;
      let adminPredPartidoId = null;
      let prediccionesGlobales = [];
      let todosLosUsuarios = [];

      function obtenerInicioPartido(partido) {
        return new Date(`${partido.fecha}T${partido.hora.substring(0, 8)}-05:00`);
      }

      function partidoAbiertoParaPrediccion(partido) {
        return new Date() < obtenerInicioPartido(partido);
      }

      async function cargarPrediccionesUsuario(usuarioId) {
        if (!usuarioId) {
          prediccionesUsuario = {};
          return;
        }

        const { data, error } = await supabaseClient
          .from("predicciones")
          .select("partido_id, goles_equipo_1, goles_equipo_2")
          .eq("usuario_id", usuarioId);

        if (error) {
          console.error(error);
          prediccionesUsuario = {};
          return;
        }

        prediccionesUsuario = {};
        data.forEach((prediccion) => {
          prediccionesUsuario[prediccion.partido_id] = prediccion;
        });
      }

      function textoBotonPrediccion(partido) {
        const prediccion = prediccionesUsuario[partido.id];
        if (!partidoAbiertoParaPrediccion(partido)) {
          return "🔒 Predicciones cerradas";
        }
        return prediccion ? "✏️ Editar predicción" : "✏️ Hacer predicción";
      }

      function renderizarTarjetaPartido(partido, index) {
        const { fecha, hora } = formatearFechaPartido(partido.fecha, partido.hora);
        const abierto = partidoAbiertoParaPrediccion(partido);
        const prediccion = prediccionesUsuario[partido.id];
        const bandera1 = partido.bandera_1
          ? `<img class="flag" src="${partido.bandera_1}" alt="">`
          : "";
        const bandera2 = partido.bandera_2
          ? `<img class="flag" src="${partido.bandera_2}" alt="">`
          : "";
        const prediccionHtml = prediccion
          ? `<p class="prediccion-guardada">Tu predicción: ${prediccion.goles_equipo_1} - ${prediccion.goles_equipo_2}</p>`
          : "";

        const btnAdminPred = (!abierto && usuarioActual?.nombre === "adminmlc")
          ? `<button class="btn-admin-pred" onclick="abrirModalAdminPred('${partido.id}')">👤 Agregar predicción</button>`
          : "";

        const card = document.createElement("div");
        card.className = "match-card";
        card.dataset.index = index;
        card.innerHTML = `
              <div class="match-header">
                  <span class="badge-fase">${partido.fase || "R32"}</span>
                  <span class="${abierto ? "status-prog" : "status-cerrado"}">${abierto ? "Programado" : "Cerrado"}</span>
              </div>
              <div class="match-teams">
                  <div class="team">
                      ${bandera1}
                      <span class="team-name">${partido.equipo_1}</span>
                  </div>
                  <div class="vs-divider">VS</div>
                  <div class="team">
                      ${bandera2}
                      <span class="team-name">${partido.equipo_2}</span>
                  </div>
              </div>
              <div class="match-footer">
                  <span>📅 ${fecha}, ${hora}</span>
                  <span>📍 Por definir</span>
              </div>
              ${prediccionHtml}
              <button class="btn-predict" data-index="${index}" ${abierto ? "" : "disabled"}>
                  ${textoBotonPrediccion(partido)}
              </button>
              ${btnAdminPred}
          `;

        const boton = card.querySelector(".btn-predict");
        if (abierto) {
          boton.addEventListener("click", () => abrirModal(index));
        }

        return card;
      }

      function actualizarEstadoBotonesPartidos() {
        listaPartidos.forEach((partido, index) => {
          const card = document.querySelector(`.match-card[data-index="${index}"]`);
          if (!card) return;

          const boton = card.querySelector(".btn-predict");
          const estado = card.querySelector(".match-header span:last-child");
          const abierto = partidoAbiertoParaPrediccion(partido);

          boton.disabled = !abierto;
          boton.innerText = textoBotonPrediccion(partido);
          estado.className = abierto ? "status-prog" : "status-cerrado";
          estado.innerText = abierto ? "Programado" : "Cerrado";

          boton.replaceWith(boton.cloneNode(true));
          const botonNuevo = card.querySelector(".btn-predict");
          if (abierto) {
            botonNuevo.addEventListener("click", () => abrirModal(index));
          }
        });
      }

      async function cargarListaUsuarios() {
        const { data, error } = await supabaseClient
          .from("usuarios")
          .select("nombre")
          .order("nombre", { ascending: true });

        const container = document.getElementById("lista-usuarios");
        const visibles = (data || []).filter((u) => u.nombre !== "adminmlc");
        if (error || !visibles.length) {
          container.innerHTML = '<p style="color:var(--text-muted);font-size:12px;margin:0">Aún no hay participantes.</p>';
          return;
        }

        container.innerHTML = "";
        visibles.forEach((u) => {
          const btn = document.createElement("button");
          btn.className = "usuario-item";
          btn.textContent = u.nombre;
          btn.addEventListener("click", () => {
            document.getElementById("username").value = u.nombre;
            registrarUsuario(true);
          });
          container.appendChild(btn);
        });
      }

      function mostrarEstadoUsuario(mensaje, tipo = "") {
        const el = document.getElementById("user-status");
        el.innerText = mensaje;
        el.className = `user-status ${tipo}`.trim();
      }

      function guardarUsuarioLocal(usuario) {
        usuarioActual = usuario;
        localStorage.setItem("pollita_usuario_id", usuario.id);
        localStorage.setItem("pollita_usuario_nombre", usuario.nombre);
        mostrarEstadoUsuario(`Registrado como ${usuario.nombre}`, "ok");
        actualizarUserBar();
      }

      async function obtenerOCrearUsuario(nombre) {
        const { data: existente, error: selectError } = await supabaseClient
          .from("usuarios")
          .select("id, nombre")
          .eq("nombre", nombre)
          .maybeSingle();

        if (selectError) throw selectError;
        if (existente) return existente;

        const { data: nuevo, error: insertError } = await supabaseClient
          .from("usuarios")
          .insert([{ nombre }])
          .select("id, nombre")
          .single();

        if (insertError) throw insertError;
        return nuevo;
      }

      function normalizarNombre(nombre) {
        return nombre
          .toLowerCase()
          .split(" ")
          .map((p) => p.charAt(0).toUpperCase() + p.slice(1))
          .join(" ");
      }

      async function registrarUsuario(soloLogin = false) {
        let nombre = document.getElementById("username").value.trim();

        if (!nombre) {
          mostrarEstadoUsuario("Escribe tu nombre para registrarte.", "error");
          return;
        }

        const esAdmin = nombre.toLowerCase() === "adminmlc";
        if (esAdmin) nombre = "adminmlc";

        if (!soloLogin && !esAdmin) {
          nombre = normalizarNombre(nombre);
          document.getElementById("username").value = nombre;

          const { data: existente } = await supabaseClient
            .from("usuarios")
            .select("id")
            .eq("nombre", nombre)
            .maybeSingle();

          if (existente) {
            mostrarEstadoUsuario("Ese nombre ya está registrado. Hacé clic en tu nombre de la lista para ingresar.", "error");
            return;
          }
        }

        try {
          const usuario = await obtenerOCrearUsuario(nombre);
          guardarUsuarioLocal(usuario);
          await cargarPrediccionesUsuario(usuario.id);
          await Promise.all([cargarPartidos(), cargarListaUsuarios()]);
          alert(`¡Listo! Ya puedes hacer predicciones como ${usuario.nombre}.`);
        } catch (error) {
          console.error(error);
          mostrarEstadoUsuario(
            "No se pudo registrar. Revisa permisos RLS en Supabase.",
            "error",
          );
        }
      }

      async function asegurarUsuarioRegistrado() {
        if (usuarioActual?.id) return usuarioActual;

        const nombre = document.getElementById("username").value.trim();
        if (!nombre) {
          throw new Error("Debes registrarte con tu nombre primero.");
        }

        const usuario = await obtenerOCrearUsuario(nombre);
        guardarUsuarioLocal(usuario);
        return usuario;
      }

      function formatearFechaPartido(fecha, hora) {
        const dt = new Date(`${fecha}T${hora.substring(0, 8)}-05:00`);
        const fechaFormateada = dt.toLocaleDateString("es-ES", { month: "short", day: "numeric" });
        const horaFormateada = dt.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", hour12: false });
        return { fecha: fechaFormateada, hora: horaFormateada };
      }

      async function cargarPartidos() {
        if (usuarioActual?.id) {
          await cargarPrediccionesUsuario(usuarioActual.id);
        }

        const { data: partidos, error } = await supabaseClient
          .from("partidos")
          .select("*")
          .order("fecha", { ascending: true })
          .order("hora", { ascending: true });

        const container = document.getElementById("partidos-container");
        container.innerHTML = "";

        if (error) {
          console.error(error);
          container.innerHTML =
            '<p style="color:#e74c3c;text-align:center">No se pudieron cargar los partidos.</p>';
          return;
        }

        if (!partidos.length) {
          container.innerHTML =
            '<p style="color:var(--text-muted);text-align:center">No hay partidos registrados aún.</p>';
          return;
        }

        listaPartidos = partidos;
        partidos.forEach((partido, index) => {
          container.appendChild(renderizarTarjetaPartido(partido, index));
        });
      }

      function abrirModal(index) {
        const nombreUsuario = document.getElementById("username").value.trim();

        if (!nombreUsuario && !usuarioActual) {
          alert("Regístrate con tu nombre antes de hacer una predicción.");
          return;
        }

        const partido = listaPartidos[index];
        if (!partido) return;

        if (!partidoAbiertoParaPrediccion(partido)) {
          alert("El tiempo para predecir este partido ya cerró.");
          return;
        }

        partidoSeleccionadoId = partido.id;
        partidoSeleccionadoIndex = index;

        document.getElementById("modal-fase").innerText = partido.fase || "R32";

        const img1 = document.getElementById("modal-img-1");
        const img2 = document.getElementById("modal-img-2");

        if (partido.bandera_1) {
          img1.src = partido.bandera_1;
          img1.style.display = "block";
        } else {
          img1.style.display = "none";
        }

        if (partido.bandera_2) {
          img2.src = partido.bandera_2;
          img2.style.display = "block";
        } else {
          img2.style.display = "none";
        }

        document.getElementById("modal-name-1").innerText = partido.equipo_1;
        document.getElementById("modal-code-1").innerText = partido.equipo_1
          .substring(0, 3)
          .toUpperCase();

        document.getElementById("modal-name-2").innerText = partido.equipo_2;
        document.getElementById("modal-code-2").innerText = partido.equipo_2
          .substring(0, 3)
          .toUpperCase();

        const { fecha, hora } = formatearFechaPartido(partido.fecha, partido.hora);
        document.getElementById("modal-date").innerText = `📅 ${fecha}, ${hora}`;

        const prediccion = prediccionesUsuario[partido.id];
        document.getElementById("score1").value = prediccion?.goles_equipo_1 ?? "";
        document.getElementById("score2").value = prediccion?.goles_equipo_2 ?? "";

        const btnGuardar = document.getElementById("btn-guardar-prediccion");
        btnGuardar.disabled = false;
        btnGuardar.innerText = prediccion
          ? "✏️ Actualizar Predicción"
          : "✏️ Confirmar Predicción";

        document.getElementById("predictionModal").style.display = "flex";
      }

      window.onclick = function (event) {
        const predModal = document.getElementById("predictionModal");
        if (event.target == predModal) predModal.style.display = "none";
        const resModal = document.getElementById("resultadoModal");
        if (event.target == resModal) resModal.style.display = "none";
        const detModal = document.getElementById("detalleModal");
        if (event.target == detModal) detModal.style.display = "none";
        const adminModal = document.getElementById("adminPredModal");
        if (event.target == adminModal) adminModal.style.display = "none";
      };

      function calcularPuntos(prediccion, partido) {
        if (partido.resultado_equipo_1 === null || partido.resultado_equipo_2 === null)
          return 0;
        if (!prediccion) return 0;
        const g1 = prediccion.goles_equipo_1;
        const g2 = prediccion.goles_equipo_2;
        const r1 = partido.resultado_equipo_1;
        const r2 = partido.resultado_equipo_2;
        if (g1 === r1 && g2 === r2) return 3;
        if (Math.sign(g1 - g2) === Math.sign(r1 - r2)) return 1;
        return 0;
      }

      async function abrirModalDetalle(partidoId) {
        const partido = listaPartidos.find((p) => p.id === partidoId);
        if (!partido) return;

        document.getElementById("detalle-fase").innerText = partido.fase || "R32";
        document.getElementById("detalle-resultado").innerText =
          `${partido.resultado_equipo_1} - ${partido.resultado_equipo_2}`;
        document.getElementById("detalle-equipos").innerText =
          `${partido.equipo_1} vs ${partido.equipo_2}`;

        const container = document.getElementById("detalle-tabla-container");
        container.innerHTML =
          '<p class="estado-vacio">Cargando...</p>';

        document.getElementById("detalleModal").style.display = "flex";

        const { data, error } = await supabaseClient
          .from("predicciones")
          .select("goles_equipo_1, goles_equipo_2, usuarios(nombre)")
          .eq("partido_id", partidoId);

        if (error) {
          console.error(error);
          container.innerHTML =
            '<p class="estado-vacio" style="color:#e74c3c">Error al cargar predicciones.</p>';
          return;
        }

        if (!data.length) {
          container.innerHTML =
            '<p class="estado-vacio">Nadie predijo este partido.</p>';
          return;
        }

        const filas = data
          .map((pred) => {
            const puntos = calcularPuntos(pred, partido);
            const color =
              puntos === 3 ? "#2ecc71" : puntos === 1 ? "#f1c40f" : "var(--text-muted)";
            return `
              <tr>
                <td>${pred.usuarios.nombre}</td>
                <td style="text-align:center">${pred.goles_equipo_1} - ${pred.goles_equipo_2}</td>
                <td style="text-align:center;color:${color};font-weight:bold">${puntos}</td>
              </tr>`;
          })
          .join("");

        container.innerHTML = `
          <table class="tabla-detalle">
            <thead>
              <tr>
                <th>Usuario</th>
                <th style="text-align:center">Predicción</th>
                <th style="text-align:center">Pts</th>
              </tr>
            </thead>
            <tbody>${filas}</tbody>
          </table>`;
      }

      function abrirModalCargarResultado(partidoId) {
        const partido = listaPartidos.find((p) => p.id === partidoId);
        if (!partido) return;

        partidoParaResultadoId = partidoId;
        document.getElementById("resultado-nombre-1").innerText = partido.equipo_1;
        document.getElementById("resultado-nombre-2").innerText = partido.equipo_2;
        document.getElementById("resultado-score1").value =
          partido.resultado_equipo_1 ?? "";
        document.getElementById("resultado-score2").value =
          partido.resultado_equipo_2 ?? "";

        const btn = document.getElementById("btn-guardar-resultado");
        btn.disabled = false;
        btn.innerText = "💾 Guardar resultado";

        document.getElementById("resultadoModal").style.display = "flex";
      }

      async function guardarResultado() {
        const score1 = document.getElementById("resultado-score1").value;
        const score2 = document.getElementById("resultado-score2").value;

        if (score1 === "" || score2 === "") {
          alert("Ingresá ambos marcadores.");
          return;
        }
        if (parseInt(score1, 10) < 0 || parseInt(score2, 10) < 0) {
          alert("Los goles no pueden ser negativos.");
          return;
        }

        const btn = document.getElementById("btn-guardar-resultado");
        btn.disabled = true;
        btn.innerText = "Guardando...";

        try {
          const { data: filas, error } = await supabaseClient
            .from("partidos")
            .update({
              resultado_equipo_1: parseInt(score1, 10),
              resultado_equipo_2: parseInt(score2, 10),
            })
            .eq("id", partidoParaResultadoId)
            .select();

          if (error) throw error;
          if (!filas || filas.length === 0)
            throw new Error("No se pudo guardar: revisá las políticas RLS de Supabase.");

          const idx = listaPartidos.findIndex((p) => p.id === partidoParaResultadoId);
          if (idx !== -1) {
            listaPartidos[idx].resultado_equipo_1 = parseInt(score1, 10);
            listaPartidos[idx].resultado_equipo_2 = parseInt(score2, 10);
          }

          btn.innerText = "Calculando puntos...";
          await recalcularYGuardarPuntos();

          document.getElementById("resultadoModal").style.display = "none";
          renderizarResultados();
        } catch (error) {
          console.error(error);
          alert("Error al guardar el resultado: " + error.message);
        } finally {
          btn.disabled = false;
          btn.innerText = "💾 Guardar resultado";
        }
      }

      async function recalcularYGuardarPuntos() {
        // Trae todas las predicciones y todos los usuarios
        const [{ data: todasPred, error: errPred }, { data: todosUsuarios, error: errU }] =
          await Promise.all([
            supabaseClient
              .from("predicciones")
              .select("usuario_id, partido_id, goles_equipo_1, goles_equipo_2"),
            supabaseClient.from("usuarios").select("id, nombre"),
          ]);

        if (errPred || errU) throw errPred || errU;

        // Acumula puntos por usuario
        const totales = {};
        todosUsuarios.forEach((u) => {
          totales[u.id] = { id: u.id, nombre: u.nombre, puntos: 0 };
        });

        (todasPred || []).forEach((pred) => {
          const partido = listaPartidos.find((p) => p.id === pred.partido_id);
          if (!partido || !totales[pred.usuario_id]) return;
          totales[pred.usuario_id].puntos += calcularPuntos(pred, partido);
        });

        // Persiste los totales en la columna puntos de usuarios
        const upsertData = Object.values(totales);
        const { error: errUpsert } = await supabaseClient
          .from("usuarios")
          .upsert(upsertData, { onConflict: "id" });

        if (errUpsert) throw errUpsert;
      }

      async function cargarUsuariosSinPrediccion(partido_id) {
        const [{ data: usuarios, error: errU }, { data: preds, error: errP }] = await Promise.all([
          supabaseClient.from("usuarios").select("id, nombre").order("nombre", { ascending: true }),
          supabaseClient.from("predicciones").select("usuario_id").eq("partido_id", partido_id),
        ]);
        if (errU) throw errU;
        if (errP) throw errP;
        const conPrediccion = new Set((preds || []).map((p) => p.usuario_id));
        return (usuarios || []).filter((u) => !conPrediccion.has(u.id));
      }

      function renderizarFormAdminPred(usuarios) {
        const container = document.getElementById("admin-pred-form-container");
        if (!usuarios.length) {
          container.innerHTML = '<p class="estado-vacio">Todos los usuarios ya tienen predicción para este partido.</p>';
          return;
        }
        const options = usuarios.map((u) => `<option value="${u.id}">${u.nombre}</option>`).join("");
        container.innerHTML = `
          <div class="admin-pred-form">
            <select id="admin-pred-usuario" class="admin-pred-select">${options}</select>
            <div class="prediction-row" style="margin:0">
              <div class="score-block" style="margin:0 auto">
                <input type="number" id="admin-pred-score1" class="input-score" placeholder="?" min="0" step="1" />
                <span class="modal-vs">VS</span>
                <input type="number" id="admin-pred-score2" class="input-score" placeholder="?" min="0" step="1" />
              </div>
            </div>
            <button class="btn-save" id="btn-guardar-pred-admin" onclick="guardarPrediccionAdmin()">💾 Guardar predicción</button>
          </div>`;
      }

      async function abrirModalAdminPred(partidoId) {
        const partido = listaPartidos.find((p) => p.id === partidoId);
        if (!partido) return;
        adminPredPartidoId = partidoId;
        document.getElementById("admin-pred-fase").innerText = partido.fase || "R32";
        document.getElementById("admin-pred-equipos").innerText = `${partido.equipo_1} vs ${partido.equipo_2}`;
        const container = document.getElementById("admin-pred-form-container");
        container.innerHTML = '<p class="estado-vacio">Cargando usuarios...</p>';
        document.getElementById("adminPredModal").style.display = "flex";
        try {
          const sinPrediccion = await cargarUsuariosSinPrediccion(partidoId);
          renderizarFormAdminPred(sinPrediccion);
        } catch (e) {
          console.error(e);
          container.innerHTML = '<p class="estado-vacio" style="color:#e74c3c">Error al cargar usuarios.</p>';
        }
      }

      async function guardarPrediccionAdmin() {
        const select = document.getElementById("admin-pred-usuario");
        const score1 = document.getElementById("admin-pred-score1").value;
        const score2 = document.getElementById("admin-pred-score2").value;
        if (!select || !select.value) { alert("Seleccioná un usuario."); return; }
        if (score1 === "" || score2 === "") { alert("Ingresá ambos marcadores."); return; }
        if (parseInt(score1, 10) < 0 || parseInt(score2, 10) < 0) { alert("Los goles no pueden ser negativos."); return; }

        const usuarioId = select.value;
        const usuarioNombre = select.options[select.selectedIndex].text;
        const btn = document.getElementById("btn-guardar-pred-admin");
        btn.disabled = true;
        btn.innerText = "Guardando...";

        try {
          const { error } = await supabaseClient.from("predicciones").upsert(
            {
              usuario_id: usuarioId,
              partido_id: adminPredPartidoId,
              goles_equipo_1: parseInt(score1, 10),
              goles_equipo_2: parseInt(score2, 10),
            },
            { onConflict: "usuario_id,partido_id" },
          );
          if (error) throw error;

          if (usuarioActual?.id === usuarioId) {
            prediccionesUsuario[adminPredPartidoId] = {
              partido_id: adminPredPartidoId,
              goles_equipo_1: parseInt(score1, 10),
              goles_equipo_2: parseInt(score2, 10),
            };
            const idx = listaPartidos.findIndex((p) => p.id === adminPredPartidoId);
            if (idx !== -1) {
              const oldCard = document.querySelector(`.match-card[data-index="${idx}"]`);
              if (oldCard) oldCard.replaceWith(renderizarTarjetaPartido(listaPartidos[idx], idx));
            }
          }

          select.querySelector(`option[value="${usuarioId}"]`)?.remove();
          document.getElementById("admin-pred-score1").value = "";
          document.getElementById("admin-pred-score2").value = "";

          if (select.options.length === 0) {
            document.getElementById("admin-pred-form-container").innerHTML =
              '<p class="estado-vacio">Todos los usuarios ya tienen predicción para este partido.</p>';
          } else {
            btn.disabled = false;
            btn.innerText = "💾 Guardar predicción";
          }

          alert(`Predicción de ${usuarioNombre} guardada.`);
        } catch (e) {
          console.error(e);
          alert("Error al guardar la predicción.");
          btn.disabled = false;
          btn.innerText = "💾 Guardar predicción";
        }
      }

      async function guardarPrediccion() {
        const goles1 = document.getElementById("score1").value;
        const goles2 = document.getElementById("score2").value;
        const partido = listaPartidos[partidoSeleccionadoIndex];

        if (!partido) {
          alert("No se encontró el partido seleccionado.");
          return;
        }

        if (!partidoAbiertoParaPrediccion(partido)) {
          alert("El tiempo para predecir este partido ya cerró.");
          document.getElementById("predictionModal").style.display = "none";
          await cargarPartidos();
          return;
        }

        if (goles1 === "" || goles2 === "") {
          alert("Por favor, introduce el marcador completo.");
          return;
        }

        if (parseInt(goles1, 10) < 0 || parseInt(goles2, 10) < 0) {
          alert("Los goles no pueden ser negativos.");
          return;
        }

        const btnGuardar = document.getElementById("btn-guardar-prediccion");
        btnGuardar.disabled = true;
        btnGuardar.innerText = "Guardando...";

        try {
          const usuario = await asegurarUsuarioRegistrado();

          const { error } = await supabaseClient.from("predicciones").upsert(
            {
              usuario_id: usuario.id,
              partido_id: partidoSeleccionadoId,
              goles_equipo_1: parseInt(goles1, 10),
              goles_equipo_2: parseInt(goles2, 10),
            },
            { onConflict: "usuario_id,partido_id" },
          );

          if (error) throw error;

          prediccionesUsuario[partidoSeleccionadoId] = {
            partido_id: partidoSeleccionadoId,
            goles_equipo_1: parseInt(goles1, 10),
            goles_equipo_2: parseInt(goles2, 10),
          };

          alert("¡Predicción guardada!");
          document.getElementById("predictionModal").style.display = "none";
          await cargarPartidos();
        } catch (error) {
          console.error(error);
          alert("Error al guardar. Regístrate primero o revisa permisos en Supabase.");
        } finally {
          btnGuardar.disabled = false;
          btnGuardar.innerText = "✏️ Confirmar Predicción";
        }
      }

      function actualizarUserBar() {
        const bar = document.getElementById("user-bar");
        if (!usuarioActual) {
          bar.style.display = "none";
          return;
        }
        bar.style.display = "flex";
        document.getElementById("user-bar-nombre").textContent = usuarioActual.nombre;

        const avatarKey = `pollita_avatar_${usuarioActual.id}`;
        const avatarData = localStorage.getItem(avatarKey);
        const avatarImg = document.getElementById("user-bar-avatar");
        const avatarPlaceholder = document.getElementById("user-bar-avatar-placeholder");

        if (avatarData) {
          avatarImg.src = avatarData;
          avatarImg.style.display = "block";
          avatarPlaceholder.style.display = "none";
        } else {
          avatarImg.style.display = "none";
          avatarPlaceholder.style.display = "flex";
        }
      }

      function cambiarAvatar(event) {
        const file = event.target.files[0];
        if (!file || !usuarioActual) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement("canvas");
            const MAX = 200;
            const scale = Math.min(1, MAX / Math.max(img.width, img.height));
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
            localStorage.setItem(`pollita_avatar_${usuarioActual.id}`, dataUrl);
            actualizarUserBar();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        event.target.value = "";
      }

      function cerrarSesion() {
        localStorage.removeItem("pollita_usuario_id");
        localStorage.removeItem("pollita_usuario_nombre");
        usuarioActual = null;
        prediccionesUsuario = {};
        document.getElementById("username").value = "";
        const statusEl = document.getElementById("user-status");
        statusEl.innerText = "";
        statusEl.className = "user-status";
        actualizarUserBar();
        cargarPartidos();
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const nombreGuardado = localStorage.getItem("pollita_usuario_nombre");
        const idGuardado = localStorage.getItem("pollita_usuario_id");

        if (nombreGuardado && idGuardado) {
          document.getElementById("username").value = nombreGuardado;
          usuarioActual = { id: idGuardado, nombre: nombreGuardado };
          mostrarEstadoUsuario(`Registrado como ${nombreGuardado}`, "ok");
          actualizarUserBar();
          await cargarPrediccionesUsuario(idGuardado);
        }

        await Promise.all([cargarPartidos(), cargarListaUsuarios()]);
        setInterval(actualizarEstadoBotonesPartidos, 30000);
      });
